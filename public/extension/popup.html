<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EficacIA – LinkedIn Connector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    .header {
      padding: 16px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #10b981, #3b82f6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
      color: white;
    }
    .title { font-weight: 600; font-size: 14px; }
    .subtitle { font-size: 11px; color: #64748b; }
    .body { padding: 16px; }
    #status {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .status-checking { background: #1e293b; color: #94a3b8; }
    .status-ok { background: #052e16; border: 1px solid #166534; color: #4ade80; }
    .status-error { background: #1c0a0a; border: 1px solid #7f1d1d; color: #f87171; }
    .hint {
      font-size: 11px;
      color: #475569;
      line-height: 1.5;
    }
    a { color: #60a5fa; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">E</div>
    <div>
      <div class="title">EficacIA Connector</div>
      <div class="subtitle">LinkedIn Session Bridge</div>
    </div>
  </div>
  <div class="body">
    <div id="status" class="status-checking">Comprobando sesión de LinkedIn...</div>
    <p class="hint">
      Esta extensión permite que <a href="https://eficacia.vercel.app" target="_blank">EficacIA</a>
      conecte tu cuenta LinkedIn de forma segura y automática.
      <br><br>
      Asegúrate de estar <a href="https://linkedin.com" target="_blank">logueado en LinkedIn</a> antes de conectar.
    </p>
  </div>
  <script>
    chrome.cookies.get({ url: 'https://www.linkedin.com', name: 'li_at' }, (cookie) => {
      const el = document.getElementById('status');
      if (cookie && cookie.value) {
        el.className = 'status-ok';
        el.textContent = '✓ Sesión LinkedIn detectada. Listo para conectar.';
      } else {
        el.className = 'status-error';
        el.textContent = '⚠ No hay sesión en LinkedIn. Inicia sesión primero.';
      }
    });
  </script>
</body>
</html>
